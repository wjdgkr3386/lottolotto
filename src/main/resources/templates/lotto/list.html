<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>로또 통계</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">

    <!-- 헤더 -->
    <div class="d-flex align-items-center justify-content-between mb-4 border-0">
        <h4 class="mb-0">🎰 로또 통계 <small class="text-muted fs-6">최근 회차: <span th:text="${lottoMaxNo}"></span>회</small></h4>
        <button type="button" class="btn btn-primary btn-sm" onclick="location.href='/lotto/insert'">회차 입력</button>
    </div>

    <!-- 핫번호 / 쿨번호 / 최장미출현 -->
    <div class="row g-3 mb-4">

        <div class="col-md-4">
            <div class="card h-100 border-danger">
                <div class="card-header bg-danger text-white text-center fw-bold">🔥 핫번호 (최다 출현)</div>
                <div class="card-body text-center">
                    <span class="badge rounded-pill bg-danger fs-3 px-4 py-3"
                          th:text="${coolHot['max']}"></span>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 border-primary">
                <div class="card-header bg-primary text-white text-center fw-bold">❄️ 쿨번호 (최소 출현)</div>
                <div class="card-body text-center">
                    <span class="badge rounded-pill bg-primary fs-3 px-4 py-3"
                          th:text="${coolHot['min']}"></span>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 border-warning">
                <div class="card-header bg-warning text-dark text-center fw-bold">⏳ 최장 미출현 번호</div>
                <div class="card-body text-center">
                    <span class="badge rounded-pill bg-warning text-dark fs-3 px-4 py-3"
                          th:text="${latestNumber}"></span>
                </div>
            </div>
        </div>

    </div>

    <!-- 타이밍 번호 -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white fw-bold">⏰ 이제 나올 타이밍 번호 TOP 6</div>
        <div class="card-body d-flex justify-content-center gap-3 flex-wrap">
            <span th:each="num : ${timeNumber}"
                  class="badge rounded-pill bg-success fs-5 px-3 py-2"
                  th:text="${num}"></span>
        </div>
    </div>

    <!-- 번호별 출현 횟수 -->
    <div class="card">
        <div class="card-header fw-bold">📊 번호별 출현 횟수 (1~45)</div>
        <div class="card-body">
            <div class="row row-cols-5 row-cols-sm-9 g-2 text-center">
                <div th:each="item : ${numGroup}" class="col">
                    <div class="border rounded p-1">
                        <div class="fw-bold" th:text="${item['num']}"></div>
                        <div class="text-muted small" th:text="${item['count']} + '회'"></div>
                        <!-- 출현 횟수 시각적 바 -->
                        <div class="progress mt-1" style="height:4px;">
                            <div class="progress-bar bg-info"
                                 th:style="'width:' + (${item['count']} * 100 / ${lottoMaxNo * 6 / 45}) + '%'"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
