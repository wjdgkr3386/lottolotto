<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>홈</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* 기본 배경 및 폰트 */
body {
    background-color: #f8f9fa;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
}

/* 카드 박스 디자인 */
.card-box {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* 로또 번호 입력란 (원형) */
.lotto-input {
    width: 50px;
    height: 50px;
    border-radius: 50% !important; /* 부트스트랩 강제 해제 */
    text-align: center;
    font-weight: bold;
    border: 2px solid #dee2e6;
    padding: 0;
}

.lotto-input:focus {
    border-color: #0d6efd;
    box-shadow: none;
    outline: none;
}

/* 보너스 번호 강조 */
.lotto-input.bonus {
    border-color: #dc3545;
    color: #dc3545;
}

/* 플레이스홀더 색상 강제 적용 */
.form-control::placeholder {
    color: #dee2e6 !important;
    opacity: 1 !important;    /* 투명도 제거 */
}

/* 브라우저별 플레이스홀더 대응 */
.form-control::-webkit-input-placeholder { color: #dee2e6 !important; }
.form-control::-moz-placeholder { color: #dee2e6 !important; opacity: 1 !important; }
.form-control:-ms-input-placeholder { color: #dee2e6 !important; }

/* 숫자 입력 화살표 제거 (Chrome, Safari, Edge, Opera) */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* 숫자 입력 화살표 제거 (Firefox) */
input[type=number] {
    -moz-appearance: textfield;
}

/* 입력창 너비 조절용 */
.w-50 {
    width: 50% !important;
}

/* 버튼 스타일 커스텀 */
.buttons button {
    border-radius: 8px;
    font-weight: bold;
    padding: 12px 0;
}
</style>
</head>

<body>

<div class="container py-4" style="max-width: 700px;">
    <h3 class="mb-4">🎱 로또 당첨번호 입력</h3>
	<button type="button" onclick="openUrl('https://www.dhlottery.co.kr/lt645/result')">
		추첨결과 확인
	</button>

    <!-- 결과 메시지 -->
    <div class="alert alert-success" th:if="${msg}" th:text="${msg}"></div>

    <form th:action="@{/lotto/insert}" method="post" id="lottoForm">

        <!-- 회차 -->
        <div class="card-box">
            <label class="form-label fw-bold">회차</label>
            <input type="number" class="form-control w-50" name="drwNo" required placeholder="예) 1219">
        </div>

        <!-- 당첨번호 -->
        <div class="card-box">
            <label class="form-label fw-bold mb-3">당첨번호</label>

            <div class="d-flex align-items-center flex-wrap gap-2">
                <input type="number" class="form-control lotto-input" name="drwtNo1" min="1" max="45" placeholder="1" required>
                <input type="number" class="form-control lotto-input" name="drwtNo2" min="1" max="45" placeholder="2" required>
                <input type="number" class="form-control lotto-input" name="drwtNo3" min="1" max="45" placeholder="3" required>
                <input type="number" class="form-control lotto-input" name="drwtNo4" min="1" max="45" placeholder="4" required>
                <input type="number" class="form-control lotto-input" name="drwtNo5" min="1" max="45" placeholder="5" required>
                <input type="number" class="form-control lotto-input" name="drwtNo6" min="1" max="45" placeholder="6" required>

                <span class="fw-bold mx-2">+</span>

                <input type="number" class="form-control lotto-input bonus" name="bnusNo" min="1" max="45" placeholder="B" required>
            </div>
        </div>

        <!-- 1등 -->
        <div class="card-box">
            <label class="form-label fw-bold">1등 당첨금 (선택)</label>
            <input type="text" class="form-control mb-3 money-input" name="win1Money" placeholder="숫자만 입력">

            <label class="form-label fw-bold">1등 당첨자수 (선택)</label>
            <input type="number" class="form-control w-50" name="win1Count" placeholder="예) 5">
        </div>

        <!-- 2등 -->
        <div class="card-box">
            <label class="form-label fw-bold">2등 당첨금 (선택)</label>
            <input type="text" class="form-control mb-3 money-input" name="win2Money" placeholder="숫자만 입력">

            <label class="form-label fw-bold">2등 당첨자수 (선택)</label>
            <input type="number" class="form-control w-50" name="win2Count" placeholder="예) 10">
        </div>

        <!-- 버튼 -->
        <div class="text-center buttons">
			<button type="button" class="btn btn-primary px-5" onclick="location.href='/lotto/list'">목록</button>
            <button type="button" class="btn btn-danger px-5" onclick="submitForm()">저장</button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// 제출 시 금액 정리
document.getElementById("lottoForm").addEventListener("submit", function() {
    document.querySelectorAll(".money-input").forEach(function(input) {
        input.value = input.value.replace(/,/g, "").replace(/원/g, "").trim();
    });
});

// 포커스 아웃 시 정리
document.querySelectorAll(".money-input").forEach(function(input) {
    input.addEventListener("blur", function() {
        input.value = input.value.replace(/,/g, "").replace(/원/g, "").trim();
    });
});

function openUrl(url){
	window.open(url, '_blank');
}

function submitForm() {
    const form = document.getElementById("lottoForm");
    const formData = new FormData(form);

    fetch("/lotto/insert", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(result => {
        if(result == 1){
            alert("저장 성공");
            location.href = "/lotto/list";
        } else {
            alert("저장 실패");
        }
    });
}
</script>

</body>
</html>
